providers = ["python"]

[phases.setup]
nixPkgs = ["python3", "python3Packages.pip", "gcc"]

[phases.install]
cmds = ["python3 -m venv /app/venv && /app/venv/bin/pip install -r backend/requirements.txt"]

[start]
cmd = "cd backend && /app/venv/bin/uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
